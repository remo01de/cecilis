<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cecilia Galerie & Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="placeholder-images.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #FFB6C1, #ADD8E6);
      overflow-x: hidden;
      color: #444;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 2rem;
    }

    header h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3rem;
      color: #FF69B4;
    }

    /* Container für Galerie und Chat */
    .main-content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    .gallery {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .gallery-main {
      position: relative;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 3 / 4;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      background: linear-gradient(135deg, #ffe0ec, #d4eaf7);
      cursor: pointer;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.6s ease;
    }

    .gallery-main img.fading { opacity: 0; }

    .gallery-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #FF69B4;
      font-size: 1rem;
      text-align: center;
      padding: 2rem;
      gap: 0.8rem;
    }

    .gallery-placeholder .placeholder-icon { font-size: 3rem; }

    .gallery-generating {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255, 182, 193, 0.85);
      color: white;
      font-weight: 600;
      gap: 1rem;
      z-index: 2;
    }

    .gallery-generating .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .gallery-thumbnails {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding: 0.3rem 0;
      scrollbar-width: thin;
      scrollbar-color: #FFB6C1 transparent;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .gallery-thumb {
      width: 56px;
      height: 75px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      flex-shrink: 0;
      opacity: 0.7;
      scroll-snap-align: start;
    }

    .gallery-thumb:hover { opacity: 1; border-color: #FF69B4; }

    .gallery-thumb.active {
      opacity: 1;
      border-color: #FF69B4;
      box-shadow: 0 2px 8px rgba(255, 105, 180, 0.4);
    }

    .gallery-info {
      font-size: 0.65rem;
      color: #999;
      text-align: center;
    }

    .chatbox {
      background: rgba(255, 255, 255, 0.9);
      width: 100%;
      box-sizing: border-box;
      max-width: 600px;
      margin: 0 auto;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Desktop-Layout: Galerie links, Chat rechts */
    @media (min-width: 768px) {
      .main-content {
        flex-direction: row;
        align-items: flex-start;
        gap: 2rem;
      }

      .gallery {
        flex: 0 0 45%;
        max-width: 500px;
      }

      .chatbox {
        flex: 1;
        margin: 0;
        max-width: none;
      }
    }

    /* Großer Desktop: Mehr Platz */
    @media (min-width: 1200px) {
      .gallery {
        flex: 0 0 40%;
      }

      .chatbox {
        flex: 1;
        max-width: 700px;
      }
    }

    .chatbox::before {
      content: "✨💖✨";
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 2.5rem;
      color: #FFD700;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .chatbox.sparkle-active::before {
      animation: sparkle 1.5s ease-in-out 3;
    }

    .chat-messages {
      height: 250px;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding: 1rem;
      background: #fff;
      border-radius: 1rem;
      box-shadow: inset 0 0 10px rgba(255,182,193,0.5);
    }

    /* Größerer Chat-Bereich auf Desktop */
    @media (min-width: 768px) {
      .chat-messages {
        height: 400px;
      }
    }

    @media (min-width: 1200px) {
      .chat-messages {
        height: 500px;
      }
    }

    .chat-message {
      display: flex;
      align-items: flex-start;
      margin-bottom: 1rem;
      position: relative;
      padding: 0.5rem;
      border-radius: 0.5rem;
      transition: background-color 0.2s;
    }

    .chat-message:hover {
      background-color: rgba(255, 182, 193, 0.1);
    }

    .chat-message img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      margin-right: 0.75rem;
      flex-shrink: 0;
      margin-top: 0.25rem;
    }

    .message-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .message-label {
      color: #FF69B4;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .user-message .message-label {
      color: #666;
    }

    .message-text {
      line-height: 1.5;
      color: #444;
      word-break: break-word;
    }

    .message-text strong {
      color: #FF69B4;
      font-weight: 600;
    }

    .message-text em {
      font-style: italic;
      color: #666;
    }

    .message-text a {
      color: #87CEEB;
      text-decoration: underline;
    }

    .message-text a:hover {
      color: #5BA8D1;
    }

    .cecilia-message {
      background-color: rgba(255, 182, 193, 0.05);
    }

    .user-message {
      background-color: rgba(173, 216, 230, 0.05);
    }

    .loading {
      opacity: 0.6;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .chat-input {
      display: flex;
      gap: 0.5rem;
    }

    .chat-input input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      font-size: 16px;
    }

    .chat-input button {
      background-color: #FF69B4;
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
    }

    .chat-input button:hover {
      background-color: #ff85c1;
    }

    .clear-btn {
      background-color: #ddd !important;
      color: #666 !important;
      padding: 0.5rem !important;
      min-width: 2.5rem;
      font-size: 1rem;
    }

    .clear-btn:hover {
      background-color: #ccc !important;
    }

    .chat-image-container {
      margin-top: 0.5rem;
      position: relative;
    }

    .chat-image-container img {
      width: 100% !important;
      max-width: 400px !important;
      height: auto !important;
      max-height: none !important;
      border-radius: 0.75rem !important;
      box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3) !important;
      margin: 0 !important;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .chat-image-container img:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4) !important;
    }

    .image-loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: linear-gradient(135deg, rgba(255,182,193,0.15), rgba(173,216,230,0.15));
      border-radius: 0.75rem;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #888;
      animation: pulse 1.5s infinite;
    }

    .image-error {
      padding: 0.5rem 0.75rem;
      background: rgba(255, 200, 200, 0.3);
      border-radius: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #c44;
    }

    .search-loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: linear-gradient(135deg, rgba(173,216,230,0.2), rgba(200,180,255,0.2));
      border-radius: 0.75rem;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #888;
      animation: pulse 1.5s infinite;
    }

    .search-sources {
      margin-top: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: rgba(173,216,230,0.1);
      border-radius: 0.5rem;
      border-left: 3px solid #87CEEB;
    }

    .search-sources summary {
      font-size: 0.8rem;
      color: #888;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .search-sources a {
      display: block;
      font-size: 0.75rem;
      color: #87CEEB;
      text-decoration: none;
      padding: 0.15rem 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-sources a:hover {
      color: #5BA8D1;
      text-decoration: underline;
    }

    @keyframes sparkle {
      0% { transform: rotate(0deg) scale(1); opacity: 0.5; }
      100% { transform: rotate(360deg) scale(1.5); opacity: 1; }
    }

    /* Magic Words – elegante Mikro-Effekte */
    .magic-word {
      position: relative;
      display: inline-block;
    }

    /* Feenstaub: goldene Sternchen steigen auf */
    .magic-particle-feenstaub {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      animation: magic-feenstaub-rise ease-out forwards;
    }

    @keyframes magic-feenstaub-rise {
      0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--mx), var(--my)) scale(0.4) rotate(var(--mr)); }
    }

    /* Magie: Schimmer-Gradient über das Wort */
    .magic-word-magie {
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.25), rgba(255,182,193,0.3), transparent);
      background-size: 250% 100%;
      background-position: 100% 0;
      animation: magic-shimmer-pass 0.9s ease-in-out forwards;
      border-radius: 3px;
      padding: 0 2px;
    }

    @keyframes magic-shimmer-pass {
      0% { background-position: 100% 0; }
      50% { background-position: 0% 0; }
      100% { background-position: -100% 0; }
    }

    /* Wunsch: Sternschnuppe unter dem Wort */
    .magic-shootingstar {
      position: absolute;
      pointer-events: none;
      width: 30px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,200,50,0.9), rgba(255,150,180,0.7));
      border-radius: 2px;
      box-shadow: 0 0 6px rgba(255,200,50,0.5), 0 0 12px rgba(255,200,50,0.2);
      animation: magic-star-arc 0.8s ease-out forwards;
      z-index: 10;
    }

    @keyframes magic-star-arc {
      0% { opacity: 0; transform: translateX(-15px) rotate(-12deg) scaleX(0.2); }
      15% { opacity: 1; }
      80% { opacity: 0.8; }
      100% { opacity: 0; transform: translateX(var(--sw)) rotate(-4deg) scaleX(1.2); }
    }

    /* Traum: sanfte leuchtende Kreise */
    .magic-bokeh {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(2px);
      animation: magic-bokeh-pulse 1.2s ease-in-out forwards;
      z-index: 10;
    }

    @keyframes magic-bokeh-pulse {
      0% { opacity: 0; transform: scale(0.3); }
      25% { opacity: var(--bo); transform: scale(1); }
      65% { opacity: var(--bo); transform: scale(1.1); }
    }

    /* Mobile Responsive Optimizations */
    @media (max-width: 767px) {
      header {
        padding: 1rem;
      }
      header h1 {
        font-size: 2.2rem;
      }
      .main-content {
        padding: 0.5rem;
        padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
        gap: 1.5rem;
      }
      .chatbox {
        padding: 0.5rem;
      }
      .chat-messages {
        height: 80vh;
        max-height: none;
      }
      .gallery-thumbnails {
        padding: 0.5rem 0;
      }
      .gallery-thumb {
        width: 60px;
        height: 80px;
      }
      .chat-input button {
        padding: 0.5rem 0.8rem;
      }
      .clear-btn {
        min-width: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Cecilia's Welt</h1>
  </header>

  <div class="main-content">
    <section class="gallery" id="gallerySection">
      <div class="gallery-main" id="galleryMain">
        <div class="gallery-placeholder" id="galleryPlaceholder">
          <span class="placeholder-icon">🎨</span>
          <span>Chatte mit Cecilia – sie malt sich passend zur Unterhaltung!</span>
        </div>
      </div>

      <div class="gallery-thumbnails" id="galleryThumbnails"></div>
      <div class="gallery-info" id="galleryInfo"></div>
    </section>

    <section class="chatbox">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Schreibe eine Nachricht an Cecilia...">
        <button onclick="sendMessage()">Senden</button>
        <button onclick="clearChat()" title="Chat leeren" class="clear-btn">🗑️</button>
      </div>
    </section>
  </div>

  <script>
    // ========================
    // Automatische Galerie
    // ========================
    const GALLERY_STORAGE_KEY = 'cecilia_gallery';
    const GALLERY_MAX_IMAGES = 30;
    const GALLERY_MIN_ROUNDS = 10;
    const GALLERY_MAX_ROUNDS = 20;

    const GALLERY_SEASON_PROMPTS = {
      spring: 'cherry blossom trees, falling petals, fresh green leaves, warm sunlight, spring garden',
      summer: 'bright golden sunshine, vivid blue sky, lush tropical greenery, warm summer glow',
      autumn: 'golden and red falling leaves, warm amber light, cozy autumn atmosphere',
      winter: 'softly falling snow, frost crystals, cool blue winter light, magical winter wonderland'
    };

    const galleryState = {
      images: [],
      currentIndex: -1,
      isGenerating: false,
      rotationTimer: null,
      roundsSinceLastImage: 0,
      nextImageThreshold: 0
    };

    function pickNextThreshold() {
      galleryState.nextImageThreshold = GALLERY_MIN_ROUNDS + Math.floor(Math.random() * (GALLERY_MAX_ROUNDS - GALLERY_MIN_ROUNDS + 1));
    }

    function getCurrentSeason() {
      const month = new Date().getMonth();
      if (month >= 2 && month <= 4) return 'spring';
      if (month >= 5 && month <= 7) return 'summer';
      if (month >= 8 && month <= 10) return 'autumn';
      return 'winter';
    }

    function getSeasonLabel(season) {
      return { spring: 'Frühling', summer: 'Sommer', autumn: 'Herbst', winter: 'Winter' }[season] || season;
    }

    async function analyzeConversationForGallery() {
      let context = '';

      const recent = conversationHistory.slice(-6);
      if (recent.length >= 2) {
        context = recent
          .map(m => `${m.role === 'user' ? 'U' : 'C'}: ${m.content.slice(0, 80)}`)
          .join('\n');
      } else if (conversationSummary) {
        context = conversationSummary.slice(0, 500);
      } else {
        return null;
      }

      const analysisPrompt = `Bestimme aus diesem Chat mood/location/outfit für Cecilia.
mood: happy|sad|thoughtful|playful|dreamy|excited|romantic|shy|confident|mischievous
location: fairy-forest|beach|bar|garden|city|mountain|library|lake|castle|meadow
outfit: dress|bikini|coat|casual|elegant|fairy-outfit|kimono|sportswear|pajamas|school-uniform
Chat: ${context}
Nur JSON: {"mood":"...","location":"...","outfit":"..."}`;

      try {
        const response = await fetch(CONFIG.API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: analysisPrompt, history: [] })
        });

        if (!response.ok) return null;
        const data = await response.json();
        const content = (data.content || '').trim();

        const jsonMatch = content.match(/\{[^}]+\}/);
        if (!jsonMatch) return null;
        return JSON.parse(jsonMatch[0]);
      } catch (e) {
        console.warn('Galerie-Analyse fehlgeschlagen:', e);
        return null;
      }
    }

    function buildAutoGalleryPrompt(analysis, season) {
      const moodDescriptions = {
        happy: 'smiling radiantly, eyes sparkling with joy, cheerful expression',
        sad: 'looking melancholic, soft tears, bittersweet gentle expression',
        thoughtful: 'pensive gaze, hand on chin, contemplative serene expression',
        playful: 'winking mischievously, tongue out slightly, fun energetic pose',
        dreamy: 'eyes half-closed, peaceful dreaming expression, serene smile',
        excited: 'eyes wide open, big bright smile, energetic enthusiastic pose',
        romantic: 'blushing cheeks, gentle loving smile, soft warm gaze, heart-shaped sparkles',
        shy: 'hiding half behind hands, blushing deeply, adorable shy expression',
        confident: 'hands on hips, bold confident smile, powerful elegant stance',
        mischievous: 'sly grin, one eyebrow raised, playful scheming expression'
      };

      const locationDescriptions = {
        'fairy-forest': 'enchanted magical fairy forest, glowing mushrooms, fireflies, ethereal mist, ancient trees with luminous vines',
        beach: 'beautiful tropical beach, turquoise ocean waves, white sand, palm trees, golden hour light',
        bar: 'cozy stylish bar interior, warm ambient lighting, elegant cocktails, wooden counter',
        garden: 'blooming flower garden, roses and lavender, stone path, butterfly, gazebo',
        city: 'modern city rooftop at twilight, sparkling city lights, skyline panorama',
        mountain: 'majestic mountain peaks, alpine meadow, crystal clear lake reflection, dramatic clouds',
        library: 'cozy magical library, floating books, candlelight, tall wooden bookshelves, warm atmosphere',
        lake: 'serene crystal clear lake at sunset, lily pads, reflections, weeping willow trees',
        castle: 'fairy tale castle interior, stained glass windows, crystal chandeliers, elegant marble halls',
        meadow: 'vast flower meadow, wildflowers, gentle breeze, rolling hills, soft clouds'
      };

      const outfitDescriptions = {
        dress: 'wearing a beautiful flowing dress with delicate lace details and ribbon accents',
        bikini: 'wearing a cute stylish bikini with floral pattern',
        coat: 'wearing a fashionable long winter coat with fur-trimmed hood and scarf',
        casual: 'wearing a casual trendy outfit with crop top and high-waisted jeans',
        elegant: 'wearing a stunning elegant evening gown with sparkly details',
        'fairy-outfit': 'wearing a magical shimmering fairy dress with translucent wings and flower crown',
        kimono: 'wearing a beautiful traditional kimono with floral patterns and elegant obi',
        sportswear: 'wearing a cute sporty outfit with pastel-colored hoodie and sneakers',
        pajamas: 'wearing adorable cozy pajamas with star patterns and fluffy slippers',
        'school-uniform': 'wearing a cute school uniform with plaid skirt and bow tie'
      };

      const parts = [
        'A beautiful anime-style fairy girl named Cecilia, age 17-19, with long flowing pastel-colored hair adorned with small flowers and magical sparkles, large expressive eyes, delicate translucent fairy wings'
      ];

      const mood = moodDescriptions[analysis.mood] || moodDescriptions.happy;
      const location = locationDescriptions[analysis.location] || locationDescriptions['fairy-forest'];
      const outfit = outfitDescriptions[analysis.outfit] || outfitDescriptions.dress;
      const seasonDesc = GALLERY_SEASON_PROMPTS[season] || GALLERY_SEASON_PROMPTS.spring;

      parts.push(outfit, mood, location, seasonDesc);
      parts.push('high quality detailed anime illustration, soft pastel color palette, magical atmosphere, beautiful lighting, 4k');

      return parts.join('. ');
    }

    function buildAnalysisLabel(analysis, season) {
      const labels = {
        mood: { happy:'Glücklich', sad:'Traurig', thoughtful:'Nachdenklich', playful:'Verspielt', dreamy:'Verträumt', excited:'Aufgeregt', romantic:'Romantisch', shy:'Schüchtern', confident:'Selbstbewusst', mischievous:'Frech' },
        location: { 'fairy-forest':'Feenwald', beach:'Strand', bar:'Bar', garden:'Garten', city:'Stadt', mountain:'Berge', library:'Bibliothek', lake:'See', castle:'Schloss', meadow:'Wiese' },
        outfit: { dress:'Kleid', bikini:'Bikini', coat:'Mantel', casual:'Casual', elegant:'Elegant', 'fairy-outfit':'Feenkleid', kimono:'Kimono', sportswear:'Sportlich', pajamas:'Pyjama', 'school-uniform':'Schuluniform' }
      };
      const parts = [];
      if (analysis.mood) parts.push(labels.mood[analysis.mood] || analysis.mood);
      parts.push(getSeasonLabel(season));
      if (analysis.location) parts.push(labels.location[analysis.location] || analysis.location);
      if (analysis.outfit) parts.push(labels.outfit[analysis.outfit] || analysis.outfit);
      return parts.join(' · ');
    }

    async function autoGenerateGalleryImage() {
      if (galleryState.isGenerating) return;
      galleryState.isGenerating = true;

      console.log('🎨 Automatische Galerie-Generierung gestartet...');

      const mainEl = document.getElementById('galleryMain');
      const overlay = document.createElement('div');
      overlay.classList.add('gallery-generating');
      overlay.innerHTML = '<div class="spinner"></div><span>Cecilia malt...</span>';
      mainEl.appendChild(overlay);

      stopGalleryRotation();

      try {
        const analysis = await analyzeConversationForGallery();
        const season = getCurrentSeason();
        const fallbackAnalysis = { mood: 'happy', location: 'fairy-forest', outfit: 'fairy-outfit' };
        const finalAnalysis = analysis || fallbackAnalysis;

        const prompt = buildAutoGalleryPrompt(finalAnalysis, season);
        console.log('🎨 Galerie-Prompt:', finalAnalysis);

        const response = await fetch(CONFIG.IMAGE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, size: '1024x1024' })
        });

        if (!response.ok) throw new Error('Bildgenerierung fehlgeschlagen');
        const data = await response.json();
        if (!data.url) throw new Error('Keine Bild-URL erhalten');

        const entry = {
          url: data.url,
          label: buildAnalysisLabel(finalAnalysis, season),
          mood: finalAnalysis.mood,
          location: finalAnalysis.location,
          outfit: finalAnalysis.outfit,
          season,
          createdAt: new Date().toISOString()
        };

        galleryState.images.push(entry);
        if (galleryState.images.length > GALLERY_MAX_IMAGES) {
          galleryState.images = galleryState.images.slice(-GALLERY_MAX_IMAGES);
        }
        galleryState.currentIndex = galleryState.images.length - 1;

        saveGalleryState();
        renderGalleryMain();
        renderGalleryThumbnails();
        startGalleryRotation();

        console.log('🎨 Galerie-Bild erfolgreich generiert:', entry.label);
      } catch (err) {
        console.warn('Galerie-Bildgenerierung fehlgeschlagen:', err);
      } finally {
        overlay.remove();
        galleryState.isGenerating = false;
      }
    }

    function checkGalleryTrigger() {
      galleryState.roundsSinceLastImage++;
      if (galleryState.roundsSinceLastImage >= galleryState.nextImageThreshold) {
        galleryState.roundsSinceLastImage = 0;
        pickNextThreshold();
        saveGalleryState();
        autoGenerateGalleryImage();
      }
    }

    function saveGalleryState() {
      try {
        localStorage.setItem(GALLERY_STORAGE_KEY, JSON.stringify({
          images: galleryState.images.slice(-GALLERY_MAX_IMAGES),
          currentIndex: galleryState.currentIndex,
          roundsSinceLastImage: galleryState.roundsSinceLastImage,
          nextImageThreshold: galleryState.nextImageThreshold
        }));
      } catch (e) { console.warn('Galerie-State konnte nicht gespeichert werden:', e); }
    }

    function loadGalleryState() {
      try {
        const raw = localStorage.getItem(GALLERY_STORAGE_KEY);
        if (!raw) { pickNextThreshold(); return; }
        const data = JSON.parse(raw);
        galleryState.images = Array.isArray(data.images) ? data.images : [];
        galleryState.currentIndex = typeof data.currentIndex === 'number' ? data.currentIndex : galleryState.images.length - 1;
        galleryState.roundsSinceLastImage = data.roundsSinceLastImage || 0;
        galleryState.nextImageThreshold = data.nextImageThreshold || 0;
        if (!galleryState.nextImageThreshold) pickNextThreshold();
      } catch (e) { console.warn('Galerie-State konnte nicht geladen werden:', e); pickNextThreshold(); }
    }

    function renderGalleryMain() {
      const mainEl = document.getElementById('galleryMain');
      const placeholder = document.getElementById('galleryPlaceholder');

      if (galleryState.images.length === 0) {
        mainEl.querySelectorAll('img').forEach(i => i.remove());
        if (placeholder) placeholder.style.display = 'flex';
        return;
      }

      if (placeholder) placeholder.style.display = 'none';

      const idx = Math.max(0, Math.min(galleryState.currentIndex, galleryState.images.length - 1));
      const entry = galleryState.images[idx];

      let imgEl = mainEl.querySelector('img');
      if (!imgEl) {
        imgEl = document.createElement('img');
        imgEl.alt = 'Cecilia Galeriebild';
        mainEl.appendChild(imgEl);
      }

      imgEl.classList.add('fading');
      setTimeout(() => {
        imgEl.src = entry.url;
        imgEl.alt = entry.label || 'Cecilia';
        imgEl.classList.remove('fading');
      }, 300);
    }

    function renderGalleryThumbnails() {
      const container = document.getElementById('galleryThumbnails');
      container.innerHTML = '';

      for (let i = 0; i < galleryState.images.length; i++) {
        const entry = galleryState.images[i];
        const thumb = document.createElement('img');
        thumb.src = entry.url;
        thumb.alt = entry.label || 'Thumbnail';
        thumb.title = entry.label || '';
        thumb.classList.add('gallery-thumb');
        if (i === galleryState.currentIndex) thumb.classList.add('active');
        thumb.addEventListener('click', () => {
          stopGalleryRotation();
          galleryState.currentIndex = i;
          renderGalleryMain();
          renderGalleryThumbnails();
          saveGalleryState();
        });
        container.appendChild(thumb);
      }

      const info = document.getElementById('galleryInfo');
      if (galleryState.images.length > 0) {
        const current = galleryState.images[Math.max(0, Math.min(galleryState.currentIndex, galleryState.images.length - 1))];
        info.textContent = current.label || `${galleryState.images.length} Bilder`;
      } else {
        info.textContent = '';
      }
    }

    function startGalleryRotation() {
      stopGalleryRotation();
      if (galleryState.images.length < 2) return;
      galleryState.rotationTimer = setInterval(() => {
        galleryState.currentIndex = (galleryState.currentIndex + 1) % galleryState.images.length;
        renderGalleryMain();
        renderGalleryThumbnails();
      }, 6000);
    }

    function stopGalleryRotation() {
      if (galleryState.rotationTimer) {
        clearInterval(galleryState.rotationTimer);
        galleryState.rotationTimer = null;
      }
    }

    document.getElementById('galleryMain').addEventListener('click', (e) => {
      if (e.target.tagName === 'IMG' && e.target.src) {
        window.open(e.target.src, '_blank');
      }
    });

    loadGalleryState();
    renderGalleryMain();
    renderGalleryThumbnails();
    if (galleryState.images.length >= 2) startGalleryRotation();

    if (galleryState.images.length === 0) {
      const season = getCurrentSeason();
      const defaultAnalysis = { mood: 'happy', location: 'fairy-forest', outfit: 'fairy-outfit' };
      const prompt = buildAutoGalleryPrompt(defaultAnalysis, season);
      galleryState.isGenerating = true;

      const mainEl = document.getElementById('galleryMain');
      const overlay = document.createElement('div');
      overlay.classList.add('gallery-generating');
      overlay.innerHTML = '<div class="spinner"></div><span>Cecilia malt ihr erstes Bild...</span>';
      mainEl.appendChild(overlay);

      fetch(
        (window.location.port === '30000' ? '' : 'http://localhost:30000') + '/api/image',
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt, size: '1024x1024' }) }
      )
        .then(r => { if (!r.ok) throw new Error('Fehler'); return r.json(); })
        .then(data => {
          if (!data.url) throw new Error('Keine URL');
          galleryState.images.push({
            url: data.url,
            label: buildAnalysisLabel(defaultAnalysis, season),
            mood: 'happy', location: 'fairy-forest', outfit: 'fairy-outfit', season,
            createdAt: new Date().toISOString()
          });
          galleryState.currentIndex = 0;
          saveGalleryState();
          renderGalleryMain();
          renderGalleryThumbnails();
          console.log('🎨 Willkommensbild generiert');
        })
        .catch(err => console.warn('Willkommensbild fehlgeschlagen:', err))
        .finally(() => { overlay.remove(); galleryState.isGenerating = false; });
    }

    // Konfiguration
    // Standard: relative URLs → Backend unter gleicher Domain / gleichem Host
    // Nur wenn über localhost:anderen Port (z.B. Live Server) geladen wird,
    // wird explizit auf http://localhost:30000 gefallbackt.
    const BACKEND_PORT = '30000';
    const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const API_BASE = isLocalhost && window.location.port !== BACKEND_PORT
      ? `http://localhost:${BACKEND_PORT}`
      : '';
    const CONFIG = {
      API_URL: API_BASE + '/api/chat',
      SUMMARIZE_URL: API_BASE + '/api/chat/summarize',
      IMAGE_URL: API_BASE + '/api/image',
      SEARCH_URL: API_BASE + '/api/search',
      USE_AI: true,
      MAX_MESSAGE_LENGTH: 1000,
      SUMMARIZE_THRESHOLD: 30,
      MAX_DISPLAY_MESSAGES: 100,
      STORAGE_KEY: 'cecilia_chat_state'
    };

    const IMAGE_MARKER_REGEX = /\[IMAGE:\s*(.+?)\]/g;
    const SEARCH_MARKER_REGEX = /\[SEARCH:\s*(.+?)\]/g;

    // Chat-State
    let isWaitingForResponse = false;
    let conversationHistory = [];
    let conversationSummary = '';
    let displayMessages = [];

    // --- localStorage Persistenz ---
    function saveChatState() {
      try {
        const trimmedDisplay = displayMessages.slice(-CONFIG.MAX_DISPLAY_MESSAGES);
        localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify({
          summary: conversationSummary,
          history: conversationHistory,
          display: trimmedDisplay
        }));
      } catch (e) {
        console.warn('Chat-State konnte nicht gespeichert werden:', e);
      }
    }

    function loadChatState() {
      try {
        const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);
        conversationSummary = state.summary || '';
        conversationHistory = Array.isArray(state.history) ? state.history : [];
        displayMessages = Array.isArray(state.display) ? state.display : [];
      } catch (e) {
        console.warn('Chat-State konnte nicht geladen werden:', e);
      }
    }

    function restoreDisplayMessages() {
      for (const msg of displayMessages) {
        const msgDiv = addMessageToChat(msg.sender, msg.text, false, true);
        if (msg.imageUrl) {
          addImageToMessage(msgDiv, msg.imageUrl);
        }
        if (msg.searchSources && msg.searchSources.length > 0) {
          addSearchSourcesToMessage(msgDiv, msg.searchSources);
        }
      }
    }

    // Einfacher Markdown-zu-HTML Converter (XSS-sicher)
    function parseMarkdown(text) {
      // Escape HTML zuerst (Sicherheit)
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Markdown-Formatierung
      // **Bold**
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      // *Italic*
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Links [text](url) - Optional
      html = html.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');

      // Zeilenumbrüche
      html = html.replace(/\n/g, '<br>');

      return html;
    }

    // [IMAGE: prompt] Marker aus Text extrahieren
    function extractImagePrompts(text) {
      const prompts = [];
      let match;
      const regex = new RegExp(IMAGE_MARKER_REGEX.source, 'g');
      while ((match = regex.exec(text)) !== null) {
        prompts.push(match[1].trim());
      }
      return prompts;
    }

    function stripImageMarkers(text) {
      return text
        .replace(IMAGE_MARKER_REGEX, '')
        .replace(SEARCH_MARKER_REGEX, '')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    // Bild generieren via Backend
    async function generateImage(prompt) {
      const response = await fetch(CONFIG.IMAGE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, size: '1024x1024' })
      });

      if (!response.ok) throw new Error('Image generation failed');
      const data = await response.json();
      return data.url;
    }

    // Hilfsfunktion: Nachricht zum Chat hinzufügen
    function addMessageToChat(sender, message, isLoading = false, isRestore = false) {
      const chatBox = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('chat-message');
      messageDiv.classList.add(sender === 'user' ? 'user-message' : 'cecilia-message');
      if (isLoading) messageDiv.classList.add('loading');

      const img = document.createElement('img');
      img.src = sender === 'user' ? 'img/user-avatar.svg' : 'img/cecilia-avatar.png';
      img.alt = sender === 'user' ? 'User' : 'Cecilia';

      const contentDiv = document.createElement('div');
      contentDiv.classList.add('message-content');

      const label = document.createElement('strong');
      label.textContent = sender === 'user' ? 'Du:' : 'Cecilia:';
      label.classList.add('message-label');

      const textDiv = document.createElement('div');
      textDiv.classList.add('message-text');

      if (sender === 'cecilia' && !isLoading) {
        const cleanText = stripImageMarkers(message);
        if (cleanText) textDiv.innerHTML = parseMarkdown(cleanText);
      } else {
        textDiv.textContent = message;
      }

      contentDiv.appendChild(label);
      contentDiv.appendChild(textDiv);

      messageDiv.appendChild(img);
      messageDiv.appendChild(contentDiv);
      chatBox.appendChild(messageDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      return messageDiv;
    }

    // Bild im Chat anzeigen (nach Generierung oder aus Restore)
    function addImageToMessage(messageDiv, imageUrl) {
      const contentDiv = messageDiv.querySelector('.message-content');
      const container = document.createElement('div');
      container.classList.add('chat-image-container');
      const imgEl = document.createElement('img');
      imgEl.src = imageUrl;
      imgEl.alt = 'Von Cecilia generiertes Bild';
      imgEl.loading = 'lazy';
      imgEl.referrerPolicy = 'no-referrer'; // Verhindert häufige 403 CDN-Blocks
      
      imgEl.onerror = () => {
        imgEl.remove();
        const errorFallback = document.createElement('div');
        errorFallback.classList.add('image-error');
        errorFallback.innerHTML = '🖼️ <em>Dieses AI-Bild aus dem Chat-Archiv ist abgelaufen und wurde vom Server entfernt.</em>';
        container.appendChild(errorFallback);
      };

      imgEl.addEventListener('click', () => window.open(imageUrl, '_blank'));
      container.appendChild(imgEl);
      contentDiv.appendChild(container);
      document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    }

    // Bild-Generierung starten und Loading-State anzeigen
    async function handleImageGeneration(messageDiv, prompt) {
      const contentDiv = messageDiv.querySelector('.message-content');
      const loadingEl = document.createElement('div');
      loadingEl.classList.add('image-loading');
      loadingEl.textContent = '🎨 Cecilia malt ein Bild...';
      contentDiv.appendChild(loadingEl);
      document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;

      try {
        const imageUrl = await generateImage(prompt);
        loadingEl.remove();
        addImageToMessage(messageDiv, imageUrl);
        return imageUrl;
      } catch (e) {
        console.error('Bildgenerierung fehlgeschlagen:', e);
        loadingEl.remove();
        const errorEl = document.createElement('div');
        errorEl.classList.add('image-error');
        errorEl.textContent = '🖼️ Bild konnte leider nicht erstellt werden.';
        contentDiv.appendChild(errorEl);
        return null;
      }
    }

    // [SEARCH: query] Marker aus Text extrahieren
    function extractSearchQueries(text) {
      const queries = [];
      let match;
      const regex = new RegExp(SEARCH_MARKER_REGEX.source, 'g');
      while ((match = regex.exec(text)) !== null) {
        queries.push(match[1].trim());
      }
      return queries;
    }

    function stripSearchMarkers(text) {
      return text.replace(SEARCH_MARKER_REGEX, '').replace(/\n{3,}/g, '\n\n').trim();
    }

    // Websuche via Backend
    async function performWebSearch(query) {
      const response = await fetch(CONFIG.SEARCH_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, count: 8 })
      });
      if (!response.ok) throw new Error('Search failed');
      const data = await response.json();
      return data.results || [];
    }

    // Suchergebnisse als Kontext für den zweiten Chat-Call formatieren
    function formatSearchResultsForContext(query, results) {
      if (results.length === 0) return `Websuche nach "${query}" ergab keine Ergebnisse.`;
      const items = results
        .map((r, i) => {
           let safeSnippet = (r.snippet || '').trim();
           if (safeSnippet.length > 500) safeSnippet = safeSnippet.substring(0, 500) + '...';
           return `${i + 1}. Website: ${r.title}\n   Inhalt/Auszug: ${safeSnippet}\n   Quelle: ${r.url}`;
        })
        .join('\n\n');
      return `Websuche nach "${query}" ergab folgende inhaltliche Auszüge:\n\n${items}`;
    }

    // Quellen-Links unter einer Nachricht anzeigen
    function addSearchSourcesToMessage(messageDiv, results) {
      if (!results || results.length === 0) return;
      const contentDiv = messageDiv.querySelector('.message-content');
      const sourcesEl = document.createElement('details');
      sourcesEl.classList.add('search-sources');
      const summary = document.createElement('summary');
      summary.textContent = `🔮 ${results.length} Quellen`;
      sourcesEl.appendChild(summary);
      for (const r of results.slice(0, 5)) {
        if (!r.url) continue;
        const a = document.createElement('a');
        a.href = r.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = r.title || r.url;
        sourcesEl.appendChild(a);
      }
      contentDiv.appendChild(sourcesEl);
    }

    // Fallback-Antworten (für Offline-Modus oder bei API-Fehler)
    // ========================
    // Magic Words – elegante Mikro-Effekte
    // ========================
    const MAGIC_WORDS = [
      { pattern: /feenstaub/i, type: 'feenstaub' },
      { pattern: /magisch|magie/i, type: 'magie' },
      { pattern: /wünsche?|wunsch/i, type: 'wunsch' },
      { pattern: /träume?|traum/i, type: 'traum' }
    ];

    const magicCooldowns = {};
    const MAGIC_COOLDOWN_MS = 3000;

    function triggerMagicEffect(type, targetEl) {
      const now = Date.now();
      if (magicCooldowns[type] && now - magicCooldowns[type] < MAGIC_COOLDOWN_MS) return;
      magicCooldowns[type] = now;

      switch (type) {
        case 'feenstaub': spawnFeenstaubParticles(targetEl); break;
        case 'magie': spawnShimmer(targetEl); break;
        case 'wunsch': spawnShootingStar(targetEl); break;
        case 'traum': spawnBokeh(targetEl); break;
      }
    }

    function spawnFeenstaubParticles(el) {
      const rect = el.getBoundingClientRect();
      const emojis = ['✨', '⭐', '✧', '·'];
      const count = 10 + Math.floor(Math.random() * 6);

      for (let i = 0; i < count; i++) {
        const p = document.createElement('span');
        p.classList.add('magic-particle-feenstaub');
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left = `${rect.left + Math.random() * rect.width}px`;
        p.style.top = `${rect.top + rect.height * 0.3}px`;
        p.style.fontSize = `${0.5 + Math.random() * 0.6}rem`;
        p.style.setProperty('--mx', `${(Math.random() - 0.5) * 60}px`);
        p.style.setProperty('--my', `${-20 - Math.random() * 50}px`);
        p.style.setProperty('--mr', `${(Math.random() - 0.5) * 180}deg`);
        p.style.animationDuration = `${0.8 + Math.random() * 0.6}s`;
        p.style.animationDelay = `${Math.random() * 0.4}s`;
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    function spawnShimmer(el) {
      el.addEventListener('animationend', () => {
        el.style.animation = 'none';
        el.style.background = 'none';
      }, { once: true });
    }

    function spawnShootingStar(el) {
      const star = document.createElement('span');
      star.classList.add('magic-shootingstar');
      star.style.bottom = '-4px';
      star.style.left = '-15px';
      star.style.setProperty('--sw', `${el.offsetWidth + 20}px`);
      el.appendChild(star);
      star.addEventListener('animationend', () => star.remove());
    }

    function spawnBokeh(el) {
      const colors = ['rgba(180,160,255,0.45)', 'rgba(150,200,255,0.35)', 'rgba(255,180,200,0.4)', 'rgba(255,220,150,0.35)'];
      const count = 4 + Math.floor(Math.random() * 3);

      for (let i = 0; i < count; i++) {
        const dot = document.createElement('span');
        dot.classList.add('magic-bokeh');
        const size = 10 + Math.random() * 16;
        dot.style.width = dot.style.height = `${size}px`;
        dot.style.background = colors[Math.floor(Math.random() * colors.length)];
        dot.style.left = `${-10 + Math.random() * 110}%`;
        dot.style.top = `${-40 + Math.random() * 60}%`;
        dot.style.setProperty('--bo', `${0.5 + Math.random() * 0.3}`);
        dot.style.animationDelay = `${i * 0.1}s`;
        el.appendChild(dot);
        dot.addEventListener('animationend', () => dot.remove());
      }
    }

    function scanForMagicWords(messageEl) {
      const textEls = messageEl.querySelectorAll('.message-text');
      if (!textEls.length) return;

      const triggered = new Set();

      textEls.forEach(textEl => {
        const html = textEl.innerHTML;
        let newHtml = html;

        for (const mw of MAGIC_WORDS) {
          if (triggered.has(mw.type)) continue;
          if (!mw.pattern.test(newHtml)) continue;

          triggered.add(mw.type);
          const cls = `magic-word magic-word-${mw.type}`;
          newHtml = newHtml.replace(mw.pattern, (match) => `<span class="${cls}">${match}</span>`);
        }

        if (newHtml !== html) textEl.innerHTML = newHtml;
      });

      if (triggered.size === 0) return;

      const sorted = [...triggered].sort((a, b) => {
        const order = ['feenstaub', 'magie', 'wunsch', 'traum'];
        return order.indexOf(a) - order.indexOf(b);
      });

      let delay = 0;
      for (const type of sorted) {
        const el = messageEl.querySelector(`.magic-word-${type}`);
        if (!el) continue;
        setTimeout(() => triggerMagicEffect(type, el), delay);
        delay += 200;
      }
    }

    function getFallbackResponse() {
      const responses = [
        "Oh, das klingt zauberhaft! ✨",
        "Magst du einen Spaziergang im Feenwald machen? 🌸",
        "Ich freue mich, mit dir zu plaudern! 💖",
        "Hihi, du bist echt nett! 😊",
        "Sollen wir zusammen Sterne zählen? ✨🌟",
        "Ich hab heute einen Schmetterling gesehen! 🦋",
        "Deine Worte machen mich glücklich! 🎀"
      ];
      return responses[Math.floor(Math.random() * responses.length)];
    }

    // API-Aufruf an Backend
    async function getCeciliaResponseFromAPI(message) {
      try {
        const payload = { message, history: conversationHistory };
        if (conversationSummary) payload.summary = conversationSummary;

        const response = await fetch(CONFIG.API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          if (response.status === 429) {
            throw new Error('Bitte warte einen Moment, bevor du eine neue Nachricht sendest.');
          }
          throw new Error('Server-Fehler');
        }

        const data = await response.json();
        return data.content || getFallbackResponse();
      } catch (error) {
        console.error('API-Fehler:', error);
        throw error;
      }
    }

    // Hauptfunktion: Nachricht senden
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();

      // Validierung
      if (!message) return;
      if (message.length > CONFIG.MAX_MESSAGE_LENGTH) {
        alert(`Nachricht ist zu lang! Maximal ${CONFIG.MAX_MESSAGE_LENGTH} Zeichen erlaubt.`);
        return;
      }
      if (isWaitingForResponse) {
        console.log('Warte noch auf Antwort...');
        return;
      }

      // User-Nachricht anzeigen
      const userMsg = addMessageToChat('user', message);
      scanForMagicWords(userMsg);
      input.value = '';
      isWaitingForResponse = true;

      // Loading-Nachricht
      const loadingMsg = addMessageToChat('cecilia', 'Denkt nach...', true);

      try {
        let response;
        let isAIResponse = false;

        if (CONFIG.USE_AI) {
          try {
            response = await getCeciliaResponseFromAPI(message);
            isAIResponse = true;
          } catch (apiError) {
            console.warn('API nicht erreichbar, verwende Fallback:', apiError);
            response = getFallbackResponse();

            if (!window.apiWarningShown) {
              window.apiWarningShown = true;
              const warningDiv = document.createElement('div');
              warningDiv.style.cssText = 'background:#fff3cd;border:1px solid #ffc107;padding:10px;margin:10px 0;border-radius:5px;font-size:12px;';
              warningDiv.textContent = '⚠️ Backend-Server nicht erreichbar. Verwende Offline-Modus mit vordefinierten Antworten.';
              document.getElementById('chatMessages').insertBefore(warningDiv, document.getElementById('chatMessages').firstChild);
            }
          }
        } else {
          response = getFallbackResponse();
        }

        // Prüfe ob Cecilia eine Websuche machen will
        const searchQueries = extractSearchQueries(response);
        let finalResponse = response;
        let searchResults = null;

        if (searchQueries.length > 0 && isAIResponse) {
          // Two-Pass: Suche ausführen, dann Cecilia nochmal fragen
          const searchQuery = searchQueries[0];
          const preliminaryText = stripSearchMarkers(response);

          // Loading-Text aktualisieren
          const loadingText = loadingMsg.querySelector('.message-text');
          if (loadingText) loadingText.textContent = '🔮 Recherchiert im Web...';

          try {
            searchResults = await performWebSearch(searchQuery);
            const searchContext = formatSearchResultsForContext(searchQuery, searchResults);

            // Loading-Text aktualisieren
            if (loadingText) loadingText.textContent = '✨ Verarbeitet Ergebnisse...';

            // Zweiter Chat-Call mit Suchergebnissen als Kontext
            const followUpPayload = {
              message: `Der User hat gefragt: "${message}"\n\nDu hast eine Websuche durchgeführt. Hier sind die inhaltlichen Auszüge aus dem Web:\n\n${searchContext}\n\nBitte antworte dem User ausführlich basierend auf diesen Inhalten. Nenne konkrete Fakten und tatsächliche Nachrichten aus den "Inhalt/Auszug"-Texten (bitte berichte die eigentlichen News, anstatt nur die Namen der Webseiten aufzuzählen!). Bleibe in deinem Charakter als Cecilia. Fasse die Informationen zusammen und präsentiere sie freundlich. Verwende KEINEN [SEARCH: ...] Marker mehr.`,
              history: conversationHistory,
              isSearchFollowUp: true
            };
            if (conversationSummary) followUpPayload.summary = conversationSummary;

            const followUpRes = await fetch(CONFIG.API_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(followUpPayload)
            });

            if (followUpRes.ok) {
              const followUpData = await followUpRes.json();
              finalResponse = followUpData.content || preliminaryText || response;
            } else {
              finalResponse = preliminaryText || response;
            }
          } catch (searchError) {
            console.warn('Websuche fehlgeschlagen:', searchError);
            finalResponse = preliminaryText || response;
            searchResults = null;
          }
        }

        // Loading-Nachricht entfernen
        loadingMsg.remove();

        // Sparkle-Animation auslösen
        const chatbox = document.querySelector('.chatbox');
        chatbox.classList.remove('sparkle-active');
        void chatbox.offsetWidth;
        chatbox.classList.add('sparkle-active');
        chatbox.addEventListener('animationend', () => chatbox.classList.remove('sparkle-active'), { once: true });

        // Cecilia-Antwort anzeigen (ohne Marker)
        const ceciliaMsg = addMessageToChat('cecilia', finalResponse);

        // Magic-Word-Effekte scannen
        scanForMagicWords(ceciliaMsg);

        // Quellen anzeigen, falls Suche stattfand
        if (searchResults && searchResults.length > 0) {
          addSearchSourcesToMessage(ceciliaMsg, searchResults);
        }

        // Bildgenerierung starten, falls [IMAGE: prompt] vorhanden
        const imagePrompts = extractImagePrompts(finalResponse);
        let generatedImageUrl = null;
        if (imagePrompts.length > 0 && CONFIG.USE_AI) {
          generatedImageUrl = await handleImageGeneration(ceciliaMsg, imagePrompts[0]);
        }

        // Display- und Conversation-History pflegen
        const displayEntry = { sender: 'cecilia', text: finalResponse };
        if (generatedImageUrl) displayEntry.imageUrl = generatedImageUrl;
        if (searchResults && searchResults.length > 0) {
          displayEntry.searchSources = searchResults.slice(0, 5).map(r => ({ title: r.title, url: r.url }));
        }
        displayMessages.push(
          { sender: 'user', text: message },
          displayEntry
        );

        if (isAIResponse) {
          conversationHistory.push(
            { role: 'user', content: message },
            { role: 'assistant', content: finalResponse }
          );

          if (conversationHistory.length >= CONFIG.SUMMARIZE_THRESHOLD) {
            await summarizeConversation();
          }
        }

        saveChatState();

        if (isAIResponse) checkGalleryTrigger();

      } catch (error) {
        loadingMsg.remove();
        addMessageToChat('cecilia', 'Entschuldigung, etwas ist schiefgelaufen. Versuche es nochmal! 🌸');
        console.error('Chat-Fehler:', error);
      } finally {
        isWaitingForResponse = false;
      }
    }

    // Zusammenfassung generieren wenn History zu lang wird
    async function summarizeConversation() {
      try {
        console.log(`Zusammenfassung wird erstellt (${conversationHistory.length} Einträge)...`);
        const payload = { history: conversationHistory };
        if (conversationSummary) payload.summary = conversationSummary;

        const response = await fetch(CONFIG.SUMMARIZE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error('Summarize fehlgeschlagen');

        const data = await response.json();
        if (data.summary) {
          conversationSummary = data.summary;
          conversationHistory = [];
          console.log('Zusammenfassung erstellt, History zurückgesetzt.');
        }
      } catch (e) {
        console.warn('Zusammenfassung fehlgeschlagen, History wird gekürzt:', e);
        conversationHistory = conversationHistory.slice(-10);
      }
    }

    // Chat leeren
    function clearChat() {
      conversationHistory = [];
      conversationSummary = '';
      displayMessages = [];
      document.getElementById('chatMessages').innerHTML = '';
      window.apiWarningShown = false;
      try { localStorage.removeItem(CONFIG.STORAGE_KEY); } catch (e) {}
    }

    // Chat-State beim Laden wiederherstellen
    loadChatState();
    restoreDisplayMessages();

    // Enter-Taste zum Senden
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !isWaitingForResponse) {
        sendMessage();
      }
    });
  </script>
</body>
</html>
